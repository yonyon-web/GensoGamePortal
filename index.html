<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>元素騎士ゲームポータル</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background: #0b0b18;
      color: #e0e0f0;
      min-height: 100vh;
    }

    /* ヘッダー */
    header {
      background: linear-gradient(135deg, #1a0a2e, #0a1a2e);
      border-bottom: 1px solid #2a2a4a;
      padding: 24px 20px;
      text-align: center;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(90deg, #c080ff, #60a0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    header p { color: #8080a0; font-size: 0.9rem; }

    header .header-links {
      margin-top: 12px;
      display: flex;
      gap: 12px;
      justify-content: center;
    }

    header .header-links a {
      color: #8080c0;
      text-decoration: none;
      font-size: 0.85rem;
      padding: 4px 12px;
      border: 1px solid #3a3a60;
      border-radius: 16px;
      transition: all 0.2s;
    }

    header .header-links a:hover {
      color: #c0c0ff;
      border-color: #6060a0;
    }

    /* フィルタ・検索バー */
    .controls {
      max-width: 1000px;
      margin: 24px auto 0;
      padding: 0 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .search-box {
      flex: 1;
      min-width: 200px;
      background: #141428;
      border: 1px solid #2a2a4a;
      color: #e0e0f0;
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
    }

    .search-box:focus { border-color: #6040a0; }
    .search-box::placeholder { color: #4a4a6a; }

    .filter-group {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: #141428;
      border: 1px solid #2a2a4a;
      color: #8080a0;
      padding: 6px 14px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 0.82rem;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: #2a1a4a;
      border-color: #6040a0;
      color: #d0b0ff;
    }

    /* ゲーム数 */
    .count-bar {
      max-width: 1000px;
      margin: 16px auto 0;
      padding: 0 16px;
      color: #4a4a6a;
      font-size: 0.82rem;
    }

    /* ゲームグリッド */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
      max-width: 1000px;
      margin: 16px auto 40px;
      padding: 0 16px;
    }

    /* ゲームカード */
    .game-card {
      background: #131326;
      border: 1px solid #1e1e3a;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }

    .game-card:hover {
      transform: translateY(-4px);
      border-color: #5030a0;
      box-shadow: 0 8px 24px rgba(80, 40, 160, 0.2);
    }

    .game-thumbnail {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      background: #0e0e20;
      display: block;
    }

    .game-thumbnail.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      color: #2a2a4a;
    }

    .game-body { padding: 14px 16px; }

    .game-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .game-creator {
      font-size: 0.78rem;
      color: #6060a0;
      margin-bottom: 8px;
    }

    .game-creator a {
      color: #8070c0;
      text-decoration: none;
    }

    .game-creator a:hover { color: #c0b0ff; }

    .game-desc {
      font-size: 0.82rem;
      color: #8080a0;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .tag-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 12px; }

    .tag {
      font-size: 0.72rem;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 600;
    }

    .tag-battle      { background: #2a1020; color: #e06080; }
    .tag-puzzle      { background: #102a20; color: #60e0a0; }
    .tag-collection  { background: #20102a; color: #c060e0; }
    .tag-casual      { background: #1a2010; color: #a0c060; }
    .tag-default     { background: #1a1a2a; color: #8080b0; }

    .col-tag {
      font-size: 0.7rem;
      padding: 2px 7px;
      border-radius: 10px;
      background: #181830;
      color: #5050a0;
      border: 1px solid #252545;
    }

    .play-btn {
      display: block;
      text-align: center;
      background: #4020a0;
      color: #e8d8ff;
      text-decoration: none;
      padding: 8px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      transition: background 0.2s;
    }

    .play-btn:hover { background: #6030c0; }

    /* 空状態 */
    .empty {
      grid-column: 1 / -1;
      text-align: center;
      color: #3a3a5a;
      padding: 60px 20px;
      font-size: 1rem;
    }

    /* フッター */
    footer {
      text-align: center;
      padding: 24px;
      border-top: 1px solid #1a1a2a;
      color: #3a3a5a;
      font-size: 0.82rem;
    }

    footer a { color: #5050a0; text-decoration: none; }
    footer a:hover { color: #9090d0; }
  </style>
</head>
<body>
  <header>
    <h1>⚔️ 元素騎士ゲームポータル</h1>
    <p>元素騎士ミニゲーム開発キットで作られたゲームの一覧</p>
    <div class="header-links">
      <a href="https://github.com/yonyon-web/GensoGameKit" target="_blank">開発キットを使う</a>
      <a href="./submit.html">ゲームを登録する</a>
    </div>
  </header>

  <div class="controls">
    <input
      class="search-box"
      id="search"
      type="search"
      placeholder="ゲームを検索..."
      aria-label="ゲームを検索"
    />
    <div class="filter-group" id="filter-group">
      <button class="filter-btn active" data-filter="all">すべて</button>
      <button class="filter-btn" data-filter="battle">バトル</button>
      <button class="filter-btn" data-filter="puzzle">パズル</button>
      <button class="filter-btn" data-filter="collection">コレクション</button>
      <button class="filter-btn" data-filter="casual">カジュアル</button>
      <button class="filter-btn" data-filter="equipment_v1">装備v1</button>
      <button class="filter-btn" data-filter="equipment_v2">装備v2</button>
      <button class="filter-btn" data-filter="block">ブロック</button>
      <button class="filter-btn" data-filter="item">アイテム</button>
    </div>
  </div>

  <div class="count-bar" id="count-bar"></div>

  <div class="grid" id="grid">
    <div class="empty">読み込み中...</div>
  </div>

  <footer>
    <p>
      <a href="https://github.com/yonyon-web/GensoGamePortal/blob/main/CONTRIBUTING.md">ゲームを登録する方法</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/yonyon-web/GensoGameKit">開発キット</a>
    </p>
  </footer>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
